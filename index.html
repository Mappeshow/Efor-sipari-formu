<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sipariş Oluştur</title>

<style>
body{
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#eef1f5;
  color:#111827;
}
.container{
  max-width:560px;
  margin:0 auto;
  padding:16px;
}
.card{
  background:#ffffff;
  border-radius:22px;
  padding:18px;
  box-shadow:0 10px 28px rgba(0,0,0,0.12);
}
h1{
  margin:0;
  font-size:27px;
  color:#111827;
}
.subtitle{
  font-size:14px;
  color:#6b7280;
  margin-top:6px;
  margin-bottom:18px;
}
label{
  display:block;
  margin-top:12px;
  margin-bottom:5px;
  font-size:13px;
  font-weight:800;
  color:#374151;
}
.required::after{
  content:" *";
  color:#dc2626;
}
input,textarea,select{
  width:100%;
  box-sizing:border-box;
  border:1px solid #cbd5e1;
  border-radius:13px;
  padding:12px;
  font-size:16px;
  background:#ffffff;
  color:#111827;
  outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}
.autofilled{
  background:#fff7cc !important;
  border-color:#f59e0b !important;
  box-shadow:0 0 0 3px rgba(245,158,11,0.14) !important;
}
.locked-field{
  background:#f3f4f6 !important;
  color:#475569 !important;
  border-color:#94a3b8 !important;
  box-shadow:none !important;
  cursor:not-allowed;
}
.locked-field:focus{
  border-color:#94a3b8 !important;
  box-shadow:none !important;
}
.same-address-lock-info{
  display:none;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e40af;
  border-radius:12px;
  padding:9px 10px;
  margin-top:8px;
  font-size:12px;
  font-weight:800;
  line-height:1.35;
}
.invalid{
  border-color:#dc2626 !important;
  box-shadow:0 0 0 3px rgba(220,38,38,0.15) !important;
}
textarea{
  min-height:74px;
  resize:vertical;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.main-section{
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:16px;
  padding:12px;
  margin-top:12px;
}
.product-box{
  background:#ffffff;
  border:2px solid #cbd5e1;
  border-radius:18px;
  padding:0;
  margin-top:18px;
  overflow:visible;
  box-shadow:0 6px 18px rgba(15,23,42,0.08);
}
.product-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  background:#111827;
  color:#ffffff;
  padding:12px;
  border-radius:16px 16px 0 0;
}
.product-title-wrap{
  display:flex;
  align-items:center;
  gap:9px;
}
.product-badge{
  min-width:30px;
  height:30px;
  border-radius:999px;
  background:#2563eb;
  color:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center
